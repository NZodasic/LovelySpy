# LovelySpy mod/client detection catalogue
#
# Global settings, brands, channels, logging, and action toggles live in config.yml.
# This file is only for mod/client policy entries used by translation probes and
# privacy/evasion vectors.

mods:
  # Cheats & Hacked Clients
  meteor_client:
    keys:
      - "key.meteor-client.open-gui"
      - "key.meteor-client.open-commands"
      - "key.category.meteor-client.meteor-client"
    expected_values:
      "key.meteor-client.open-gui": "Open GUI"
      "key.meteor-client.open-commands": "Open Commands"
      "key.category.meteor-client.meteor-client": "Meteor Client"
    min_matches: 1
    action: BAN
    message: "Hacked Client Detected: Meteor Client"

  # Wurst 7 keeps these in assets/wurst/translations/*.json and renders them
  # through WurstTranslator/WText. Minecraft's normal Component translation
  # table cannot see them, so this Vector 1 signature is documented but off.
  wurst:
    keys:
      - "description.wurst.hack.clickgui"
      - "key.wurst.zoom"
    min_matches: 2
    action: BAN
    message: "Hacked Client Detected: Wurst Client"
    enabled: false

  # LiquidBounce keeps its client language table under resources/liquidbounce
  # and only exposes it through LiquidBounce's own LanguageText content.
  # Server-sent vanilla TranslatableContents should not resolve these keys.
  liquidbounce:
    keys:
      - "modmenu.descriptionTranslation.liquidbounce"
      - "liquidbounce.module.hud.description"
      - "liquidbounce.module.translationFix.description"
    min_matches: 2
    action: BAN
    message: "Hacked Client Detected: LiquidBounce"
    enabled: false

  # CheckHacks uses Aristois' EMC module translation key.
  aristois:
    keys:
      - "emc.module.killaura.name"
    action: BAN
    message: "Hacked Client Detected: Aristois"

  # CheckHacks uses BleachHack's module translation key.
  bleachhack:
    keys:
      - "bleachhack.module.killaura"
    action: BAN
    message: "Hacked Client Detected: BleachHack"

  # CheckHacks uses Coffee Client's module translation key.
  coffee_client:
    keys:
      - "coffee.module.killaura.name"
    action: BAN
    message: "Hacked Client Detected: Coffee Client"

  # CheckHacks uses Lumina's click GUI keybind translation key.
  lumina:
    keys:
      - "key.lumina.open_click_gui"
    action: BAN
    message: "Hacked Client Detected: Lumina"

  thunderhack:
    keys:
      - "descriptions.client.clickgui"
      - "descriptions.client.clientsettings"
      - "descriptions.commands.bind"
    min_matches: 3
    action: BAN
    message: "Hacked Client Detected: ThunderHack"

  # No public Vape source was provided/found, so the old placeholder key is
  # disabled. Vector 2 brand/channel checks remain the safer path here.
  vape:
    keys: []
    action: BAN
    message: "Hacked Client Detected: Vape"
    enabled: false

  # No public Doomsday source was provided/found, so there is no verified
  # translation-probe key. Vector 2 brand checks cover explicit client brands.
  doomsday:
    keys: []
    action: BAN
    message: "Hacked Client Detected: Doomsday Client"
    enabled: false

  # Unfair Advantage Mods
  killaura_fabric:
    keys:
      - "key.killaura"
    action: KICK
    message: "Unallowed Mod Detected: KillAura (Fabric)"

  autoclicker_fabric:
    keys:
      - "autoclicker-fabric.hud.holding"
    action: KICK
    message: "Unallowed Mod Detected: AutoClicker (Fabric)"

  autoclicker_p1k0chu:
    keys:
      - "key.auto-clicker_.toggle"
    action: KICK
    message: "Unallowed Mod Detected: Auto Clicker (p1k0chu)"

  xray_fabric:
    keys:
      - "xray.config.toggle"
    action: BAN
    message: "Unallowed Mod Detected: XRay (Fabric)"

  chestesp:
    keys:
      - "key.chestesp.toggle"
    action: KICK
    message: "Unallowed Mod Detected: ChestESP"

  freecam:
    keys:
      - "key.freecam.toggle"
    action: KICK
    message: "Unallowed Mod Detected: Freecam"

  autototem:
    keys:
      - "autototem.enabled"
    action: KICK
    message: "Unallowed Mod Detected: AutoTotem"

  # Meteor's AutoTotem module is covered by meteor_client. Current Meteor source
  # does not expose stable per-module translation keys, so adding a second
  # AutoTotem(Meteor) rule would double-punish every Meteor detection.

  inventory_profiles_next:
    keys:
      - "inventoryprofiles.key.sort"
    action: KICK
    message: "Unallowed Mod Detected: Inventory Profiles Next"

  autofish:
    keys:
      - "key.autofish.open_gui"
    action: KICK
    message: "Unallowed Mod Detected: AutoFish"

  autoswitch:
    keys:
      - "key.autoswitch.toggle"
    action: KICK
    message: "Unallowed Mod Detected: AutoSwitch"

  antiafk:
    keys:
      - "key.antiafk.toggle"
    action: KICK
    message: "Unallowed Mod Detected: AntiAFK"

  # Utility Mods (Configured as Unallowed)
  world_downloader:
    keys:
      - "wdl.enabled"
    action: KICK
    message: "Unallowed Mod Detected: World Downloader"

  item_scroller:
    keys:
      - "itemscroller.key.sort"
    action: KICK
    message: "Unallowed Mod Detected: Item Scroller"

  xaero_minimap:
    keys:
      - "xaero_minimap.key.nearbyPlayers"
    action: KICK
    message: "Unallowed Mod Detected: Xaero's Minimap"

  journeymap:
    keys:
      - "journeymap.key.map"
    action: KICK
    message: "Unallowed Mod Detected: JourneyMap"

  # Bypassers / anti-fingerprinting tools
  opsec:
    # Privacy evidence is routed by vector, not sent as translation-probe keys.
    keys: []
    vector: privacy_probe
    action: BAN
    message: "Bypass Detected: OpSec / ExploitPreventer-style key-resolution protection"

  # Advanced OpSec detection via timing anomalies
  opsec_timing_anomaly:
    vector: timing_anomaly
    action: FLAG
    message: "OpSec detected: Timing anomaly patterns consistent with packet filtering"
    enabled: true

  # Advanced OpSec detection via behavioral inconsistencies
  opsec_behavioral_inconsistency:
    vector: behavioral_consistency
    action: FLAG
    message: "OpSec detected: Behavioral inconsistencies across multiple detection vectors"
    enabled: true

  # Advanced OpSec detection via resource pack patterns
  opsec_resource_pack_pattern:
    vector: resource_pack_pattern
    action: FLAG
    message: "OpSec detected: Resource pack manipulation patterns (cache isolation)"
    enabled: true

  # Multi-vector correlation detection for OpSec
  opsec_correlation:
    vector: correlation_engine
    action: BAN
    message: "OpSec detected: High-confidence multi-vector correlation analysis"
    enabled: true

  # Opt-in strict policy. Current OpSec/ExploitPreventer can make a prohibited
  # mod's translation response identical to a clean Fabric response, so this
  # cannot identify the shield by name. Enabling it bans every modded client
  # whose scan cannot prove which prohibited mods are absent.
  unverifiable_modded_client:
    keys: []
    vector: unverifiable_client
    action: BAN
    message: "Unverifiable modded client: prohibited-mod scan may be shielded"
    enabled: false

  # Official standalone Baritone 1.21.11 has no translation/keybind/channel
  # fingerprint. This entry is fed only by correlated behavior plus GrimAC
  # flags. Keep FLAG until thresholds have been validated on this server.
  baritone:
    keys: []
    vector: baritone_behavior
    action: FLAG
    message: "Baritone-like automation detected (behavior + Grim correlation)"
    enabled: true
