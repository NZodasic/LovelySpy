# LovelySpy configuration

probe_delay_ticks: 40          # Wait 2s for the normal login packet burst to settle
confirmation_delay_ms: 300     # Time between probe and confirmation pass
probe_timeout_ticks: 100       # No-response threshold (100 ticks = 5 seconds)
probe_batch_delay_ticks: 20    # Pace sign responses; avoids packet-funnel false flags
sign_close_delay_ticks: 3      # 150ms render window; instant interceptors answer below the 100ms threshold

# Vector 1: Adaptive Translation Fingerprinting
vector1:
  sprt:
    alpha: 0.05                # Maximum target false-positive probability
    beta: 0.10                 # Maximum target false-negative probability
    max_samples: 20            # Hard cap before choosing the stronger hypothesis
    fast_threshold_ms: 50      # Resolved-quickly likelihood boundary
    slow_threshold_ms: 150     # Timeout/blocked likelihood boundary
  adaptive_latency:
    ewma_alpha: 0.3            # Responsiveness of the per-player latency baseline
    chebyshev_k: 3.5           # Distribution-free lower-bound multiplier
    minimum_samples: 5         # Keep the conservative fixed prior while warming up
    minimum_threshold_ms: 30   # Never classify below this physical lower bound

# OpSec research stack. Timing bimodality is weak correlation evidence only;
# it cannot trigger an action without an independent Vector 9 signal.
opsec_detection:
  enabled: true
  timing:
    precision: NANOSECONDS
    min_samples: 100
  features:
    timing_bimodality:
      # Experimental until validated against clean packet traces. This analyzes
      # inbound per-packet-type inter-arrival times, never server handler runtime.
      enabled: false
      threshold: 0.555
      consecutive_windows: 3   # Require persistence across shifted windows
  fpc:
    min_observation_time_sec: 30
    require_multiple_vectors: true

vector9:
  fire_threshold: 8.0         # Weighted multi-signal score required for correlation detection
canary_key: "key.forward"      # Primary vanilla control key; kept for older configs/GUI
privacy_control_keys:          # Vanilla keys that must resolve on normal clients
  - "gui.done"
  - "gui.cancel"
  - "menu.options"
  - "key.forward"
  - "key.jump"
  - "key.attack"
  - "key.left"
  - "key.right"
  - "key.back"
  - "key.sneak"
  - "key.sprint"
  - "key.use"

# Vector 6: Behavioral Paradox Engine - Resource pack translation keys
# These keys should be defined in your server's resource pack for P4 detection
# (pack accept → stale translation paradox)
resource_pack_probe_keys:
  - "myserver.welcome"
  - "myserver.rules"
  - "myserver.features"

# Standalone Baritone exposes no stable brand, channel, keybind, or translation
# signature. This detector therefore correlates repeated automation-like motion
# with independent GrimAC flags. Its policy entry defaults to FLAG in mods.yml.
baritone-behavior:
  enabled: true
  evidence-window-seconds: 120
  minimum-centered-targets: 8
  minimum-movement-patterns: 3
  minimum-grim-flags: 2
  detection-cooldown-seconds: 300
  
auto-check-on-join:
  enabled: true
  only-first-join: false

# Mod/client detection entries are stored separately in mods.yml

# Brand & channel detection
known_cheat_brands:
  - "Impact"
  - "Jigsaw"
  - "Meteor Client"
  - "Wurst"
  - "LiquidBounce"
  - "Aristois"
  - "BleachHack"
  - "Coffee"
  - "Coffee Client"
  - "Lumina"
  - "ThunderHack"
  - "Vape"
  - "Doomsday"
  - "OpSec"
known_cheat_channels:
  - "wdl|init"
  - "seedcracker"

# Whitelist of legitimate client brands
legitimate_brands:
  - "lunarloader"
  - "lunarclient"
  - "laby4"
  - "badlion"
  - "feather"
  - "essential"
  - "fabric"
  - "forge"
  - "neoforge"
  - "vanilla"

# Actions
actions:
  KICK: true
  BAN: true
  FLAG: true
  SHADOW: true

# Logging
log_file: "plugins/LovelySpy/logs.json"

# Discord bot alerts
# The bot must be in the server and have View Channel, Send Messages,
# and Embed Links permissions in the configured channel.
discord-bot:
  enabled: false
  bot-token: "CHANGE_ME"
  channel-id: "CHANGE_ME"
  embed-color: 16776960
  message: "&summary&"

# Web Panel Integration (Supports HTTPS for Vercel deployment)
web-panel:
  enabled: false
  url: "http://localhost:3000/api/detections"
  secret: "YOUR_CUSTOM_SECRET_KEY"
