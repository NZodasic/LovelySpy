# LovelySpy configuration

probe_delay_ticks: 40          # Wait 2s for the normal login packet burst to settle
confirmation_delay_ms: 300     # Time between probe and confirmation pass
probe_timeout_ticks: 60        # No-response threshold (60 ticks = 3 seconds)
probe_batch_delay_ticks: 20    # Pace sign responses; avoids packet-funnel false flags
canary_key: "key.forward"      # Canary key to test translation shield

mods:
  # Cheats & Hacked Clients
  meteor_client:
    keys:
      - "meteor-client.gui.tabs.mods"
    action: BAN
    message: "Hacked Client Detected: Meteor Client"
  wurst:
    keys:
      - "wurst.hud.enabled"
    action: BAN
    message: "Hacked Client Detected: Wurst Client"
  liquidbounce:
    keys:
      - "liquidbounce.gui.hud"
    action: BAN
    message: "Hacked Client Detected: LiquidBounce"
  aristois:
    keys:
      - "aristois.hud.enabled"
    action: BAN
    message: "Hacked Client Detected: Aristois"
  bleachhack:
    keys:
      - "bleachhack.gui.mods"
    action: BAN
    message: "Hacked Client Detected: BleachHack"
  coffee_client:
    keys:
      - "coffee.gui.mods"
    action: BAN
    message: "Hacked Client Detected: Coffee Client"
  lumina:
    keys:
      - "lumina.hud.enabled"
    action: BAN
    message: "Hacked Client Detected: Lumina"

  # Unfair Advantage Mods
  killaura_fabric:
    keys:
      - "killaura.enabled"
    action: KICK
    message: "Unallowed Mod Detected: KillAura (Fabric)"
  autoclicker_fabric:
    keys:
      - "autoclicker.enabled"
    action: KICK
    message: "Unallowed Mod Detected: AutoClicker (Fabric)"
  autoclicker_p1k0chu:
    keys:
      - "p1k0chu.autoclicker.enabled"
    action: KICK
    message: "Unallowed Mod Detected: Auto Clicker (p1k0chu)"
  xray_fabric:
    keys:
      - "xray.enabled"
    action: BAN
    message: "Unallowed Mod Detected: XRay (Fabric)"
  chestesp:
    keys:
      - "chestesp.enabled"
    action: KICK
    message: "Unallowed Mod Detected: ChestESP"
  freecam:
    keys:
      - "freecam.enabled"
    action: KICK
    message: "Unallowed Mod Detected: Freecam"
  autototem:
    keys:
      - "autototem.enabled"
    action: KICK
    message: "Unallowed Mod Detected: AutoTotem"
  inventory_profiles_next:
    keys:
      - "inventoryprofiles.key.sort"
    action: FLAG
    message: "Unallowed Mod Detected: Inventory Profiles Next"
  autofish:
    keys:
      - "autofish.enabled"
    action: FLAG
    message: "Unallowed Mod Detected: AutoFish"
  autoswitch:
    keys:
      - "autoswitch.enabled"
    action: FLAG
    message: "Unallowed Mod Detected: AutoSwitch"
  antiafk:
    keys:
      - "antiafk.enabled"
    action: FLAG
    message: "Unallowed Mod Detected: AntiAFK"
  vape:
    keys:
      - "vape.enabled"
    action: BAN
    message: "Hacked Client Detected: Vape"

  # Utility Mods (Configured as Unallowed)
  world_downloader:
    keys:
      - "wdl.enabled"
    action: KICK
    message: "Unallowed Mod Detected: World Downloader"
  item_scroller:
    keys:
      - "itemscroller.key.sort"
    action: FLAG
    message: "Unallowed Mod Detected: Item Scroller"
  xaero_minimap:
    keys:
      - "xaero_minimap.key.nearbyPlayers"
    action: FLAG
    message: "Unallowed Mod Detected: Xaero's Minimap"
  journeymap:
    keys:
      - "journeymap.key.map"
    action: FLAG
    message: "Unallowed Mod Detected: JourneyMap"

  # Bypassers
  opsec:
    vector: privacy_probe
    action: SHADOW
    message: "Bypass Detected: OpSec Bypass"

# Brand & channel detection
known_cheat_brands:
  - "Impact"
  - "Jigsaw"
  - "Meteor Client"
  - "Wurst"
  - "LiquidBounce"
  - "Aristois"
  - "BleachHack"
  - "Coffee"
  - "Lumina"
  - "Vape"
known_cheat_channels:
  - "wdl|init"
  - "seedcracker"

# Whitelist of legitimate client brands
legitimate_brands:
  - "lunarloader"
  - "lunarclient"
  - "laby4"
  - "badlion"
  - "feather"
  - "essential"
  - "fabric"
  - "forge"
  - "neoforge"
  - "vanilla"

# Actions
actions:
  KICK: true
  BAN: true
  FLAG: true
  SHADOW: true

# Logging
log_file: "plugins/LovelySpy/logs.json"

# Discord bot alerts
# The bot must be in the server and have View Channel, Send Messages,
# and Embed Links permissions in the configured channel.
discord-bot:
  enabled: false
  bot-token: "CHANGE_ME"
  channel-id: "CHANGE_ME"
  embed-color: 16776960
  message: "&summary&"
